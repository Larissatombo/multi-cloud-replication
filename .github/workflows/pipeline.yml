name: CI/CD Multi-Cloud Replication

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    name: Tests automatisés
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm install

      - name: Lancer les tests Jest
        run: npm test

  build:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Construire l'image Docker
        run: docker build -t multi-cloud-api:latest .

      - name: Vérifier que l'image existe
        run: docker images | grep multi-cloud-api


  deploy:
    name: Déploiement (simulation)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Simulation du déploiement
        run: |
          echo "Tests passés"
          echo "Image Docker construite"
          echo "Déploiement sur l'environnement de production simulé..."
          echo "Déploiement terminé avec succès !"
